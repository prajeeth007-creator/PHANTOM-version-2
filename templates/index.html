<!DOCTYPE html>
<html>
<head>
    <title>BMO Chatbot</title>
    <style>
        :root { --bmo-teal: #4db6ac; --bmo-screen: #b6e3c4; }
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Courier New', monospace; }
        
        /* BMO Body */
        .bmo-body {
            width: 320px; background: var(--bmo-teal); border-radius: 25px; padding: 25px;
            box-shadow: inset -8px -8px 0px #388e85, 12px 12px 0px #000;
            display: flex; flex-direction: column; gap: 15px; transition: 0.3s;
        }

        .game-active { background: #e53935 !important; }
        .game-active .screen { background: #ffcdd2 !important; border-color: #b71c1c; }

        /* Face/Screen */
        .screen {
            background: var(--bmo-screen); height: 180px; border-radius: 15px;
            border: 8px solid #388e85; display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: relative;
        }

        .eyes { display: flex; gap: 70px; }
        .eye { width: 16px; height: 16px; background: #000; border-radius: 50%; animation: blink 4s infinite; }
        .mouth { width: 45px; height: 15px; border-bottom: 6px solid #000; border-radius: 0 0 50% 50%; margin-top: 15px; }

        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
        .talking .mouth { animation: speak 0.2s infinite alternate; background: #000; }
        @keyframes speak { from { height: 5px; } to { height: 30px; } }

        /* UI Elements */
        #logs { background: rgba(0,0,0,0.05); height: 80px; padding: 10px; font-size: 13px; border-radius: 10px; overflow-y: auto; border: 1px solid rgba(0,0,0,0.1); }
        .controls { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 15px; border: none; outline: none; }
        button { border: none; cursor: pointer; border-radius: 10px; font-weight: bold; }
        .btn-game { background: #2196f3; color: white; padding: 8px; }
    </style>
</head>
<body>

<div class="bmo-body" id="bmo">
    <div class="screen" id="face">
        <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
        <div class="mouth"></div>
    </div>
    <div id="logs">BMO: Waiting for Finn...</div>
    <div class="controls">
        <input type="text" id="userInput" placeholder="Type..." onkeypress="if(event.key==='Enter') chat()">
        <button onclick="startMic()">🎤</button>
        <button onclick="chat()" style="background:#ffeb3b">GO</button>
    </div>
    <button class="btn-game" onclick="toggleGame()">VIDEO GAME MODE</button>
</div>

<script>
    let isGame = false;

    function toggleGame() {
        isGame = !isGame;
        document.getElementById('bmo').classList.toggle('game-active');
        speak(isGame ? "Video game time!" : "Back to normal.");
    }

    async function chat() {
        const input = document.getElementById('userInput');
        const text = input.value;
        if(!text) return;
        input.value = "";

        // Send to Flask
        const response = await fetch(`/get?userMessage=${encodeURIComponent(text)}`);
        const bmoReply = await response.text();
        
        document.getElementById('logs').innerHTML = `<b>BMO:</b> ${bmoReply}`;
        speak(bmoReply);
    }

    function speak(text) {
        const synth = window.speechSynthesis;
        const utter = new SpeechSynthesisUtterance(text);
        utter.pitch = isGame ? 2.0 : 1.5; // BMO Voice
        document.getElementById('face').classList.add('talking');
        utter.onend = () => document.getElementById('face').classList.remove('talking');
        synth.speak(utter);
    }

    function startMic() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = new Speech();
        rec.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; chat(); };
        rec.start();
    }
</script>
</body>
</html>
