<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat UI</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        :root{
            --green:#3cff00;
            --black:#0b0b0b;
            --dark:#111;
        }

        *{
            box-sizing:border-box;
            margin:0;
            padding:0;
            font-family:'Montserrat', sans-serif;
        }

        body{
            height:100vh;
            background:var(--black);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .chat-container{
            width:420px;
            height:600px;
            background:var(--dark);
            border-radius:16px;
            display:flex;
            flex-direction:column;
            box-shadow:0 0 30px rgba(0,255,0,0.08);
        }

        .chat-header{
            padding:15px;
            text-align:center;
            color:var(--green);
            border-bottom:1px solid rgba(60,255,0,0.2);
            font-weight:600;
            letter-spacing:1px;
        }

        .chat-box{
            flex:1;
            padding:15px;
            overflow-y:auto;
        }

        .botText, .userText{
            margin-bottom:12px;
            line-height:1.4;
        }

        /* ✅ FIXED TEXT COLOR */
        .botText span{
            background:#1a1a1a;
            color:#ffffff;
            padding:10px 14px;
            border-radius:12px 12px 12px 0;
            display:inline-block;
            max-width:80%;
        }

        .userText{
            text-align:right;
        }

        .userText span{
            background:#202020;
            color:#ffffff;
            padding:10px 14px;
            border-radius:12px 12px 0 12px;
            display:inline-block;
            max-width:80%;
        }

        .input-area{
            padding:14px;
            border-top:1px solid rgba(60,255,0,0.2);
            position:relative;
        }

        .input-area::before,
        .input-area::after{
            content:'';
            position:absolute;
            width:40px;
            height:2px;
            background:var(--green);
        }

        .input-area::before{
            top:6px;
            left:6px;
        }

        .input-area::after{
            bottom:6px;
            right:6px;
        }

        #textInput{
            width:100%;
            padding:12px;
            background:transparent;
            border:1px solid rgba(60,255,0,0.4);
            border-radius:10px;
            color:white;
            outline:none;
        }

        #buttonInput{
            margin-top:10px;
            width:100%;
            padding:10px;
            background:transparent;
            border:1px solid var(--green);
            color:var(--green);
            border-radius:10px;
            cursor:pointer;
            font-weight:600;
        }

        #buttonInput:hover{
            background:rgba(60,255,0,0.08);
        }
    </style>
</head>

<body>

<div class="chat-container">
    <div class="chat-header">J.A.R.V.I.S</div>

    <div class="chat-box" id="chatbox">
        <p class="botText"><span>System online.</span></p>
    </div>

    <div class="input-area">
        <input type="text" id="textInput" placeholder="Type your message...">
        <button id="buttonInput">Send</button>
    </div>
</div>

<script>
    function getUserResponse(){
        let userText = $("#textInput").val();
        if(userText === "") return;

        let userHtml = '<p class="userText"><span>' + userText + '</span></p>';
        $("#chatbox").append(userHtml);
        $("#textInput").val("");

        $.get("/get", { userMessage: userText }).done(function(data){
            let botHtml = '<p class="botText"><span>' + data + '</span></p>';
            $("#chatbox").append(botHtml);
            $("#chatbox").scrollTop($("#chatbox")[0].scrollHeight);
        });
    }

    $("#buttonInput").click(function(){
        getUserResponse();
    });

    $("#textInput").keypress(function(e){
        if(e.which === 13){
            getUserResponse();
        }
    });
</script>

</body>
</html>
